<!DOCTYPE html>
<html>
<head>
  <title>Customers</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/admin.css">
  <style>
    .customer-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
    .btn-secondary{background:#444;color:#fff;border:none;padding:8px 12px;border-radius:10px;cursor:pointer;font-weight:700}
    .btn-danger{background:#b91c1c;color:#fff;border:none;padding:8px 12px;border-radius:10px;cursor:pointer;font-weight:700}
    .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:9999}
    .modal-backdrop.show{display:flex}
    .modal{width:min(520px,92vw);background:rgba(255,255,255,.95);border-radius:18px;padding:18px;box-shadow:0 20px 60px rgba(0,0,0,.35)}
    html.dark-mode .modal{background:rgba(0,0,0,.55);color:#fff}
    .modal h2{margin-top:0}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .form-row.single{grid-template-columns:1fr}
    .field{display:flex;flex-direction:column;gap:6px}
    .field label{font-weight:800}
    .field input,.field textarea{padding:10px 12px;border-radius:12px;border:1px solid rgba(0,0,0,.2)}
    html.dark-mode .field input, html.dark-mode .field textarea{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.15);color:#fff}
    .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:14px}
  </style>
</head>
<body>
  <div class="mobile-header">
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
    <h2>🧶 croch_etgallery</h2>
  </div>

  <div class="sidebar">
    <h2 id="desktopLogo">🧶 croch_etgallery</h2>
    <a href="dashboard.html">Dashboard</a>
    <a href="customers.html">Customers</a>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="content">
    <h1>Customers</h1>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px">
      <button class="save-btn" onclick="window.location='customers.html'">Customers</button>
      <button class="save-btn" onclick="window.location='orders.html'">Orders</button>
    </div>

    <div id="customerList"></div>
  </div>

  <!-- Edit Modal -->
  <div class="modal-backdrop" id="customerEditBackdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="customerEditTitle">
      <h2 id="customerEditTitle">Edit Customer</h2>

      <form id="customerEditForm" onsubmit="event.preventDefault(); saveCustomerEdit();">
        <input type="hidden" id="editCustomerId" />

        <div class="form-row">
          <div class="field">
            <label for="editCustomerName">Name</label>
            <input id="editCustomerName" type="text" required />
          </div>
          <div class="field">
            <label for="editCustomerPhone">Phone</label>
            <input id="editCustomerPhone" type="text" required />
          </div>
        </div>

        <div class="form-row" style="margin-top:12px">
          <div class="field">
            <label for="editCustomerEmail">Email</label>
            <input id="editCustomerEmail" type="email" />
          </div>
          <div class="field">
            <label for="editCustomerAddress">Address</label>
            <input id="editCustomerAddress" type="text" required />
          </div>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn-secondary" onclick="closeCustomerEdit()">Cancel</button>
          <button type="submit" class="save-btn">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/customers.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/globalSettings.js"></script>
  <script src="js/auth.js"></script>

  <script>
    function toggleDarkMode(){
      const isDark = localStorage.getItem("darkMode")==="true";
      localStorage.setItem("darkMode", String(!isDark));
      document.body.classList.toggle("dark-mode", !isDark);
    }

    if(localStorage.getItem("darkMode")==="true"){
      document.body.classList.add("dark-mode");
    }
  </script>

  <button class="save-btn" onclick="toggleDarkMode()">🌙 Toggle Dark Mode</button>
</body>
</html>
