  <script>
    async function loadProductFromQuery() {
      const params = new URLSearchParams(window.location.search);
      const id = Number(params.get('id'));

      const img = document.getElementById('productImage');
      const title = document.getElementById('productName');
      const price = document.getElementById('productPrice');
      const desc = document.getElementById('productDescription');
      const status = document.getElementById('productStatus');
      const btn = document.getElementById('addToCartBtn');
      const waLink = document.getElementById('waOrderBtn');

      if (!Number.isFinite(id) || id <= 0) {
        window.location.replace('products.html');
        return;
      }

      try {
        const res = await fetch(WC.api(`/api/products/${id}`));
        if (!res.ok) throw new Error(`Product not found (HTTP ${res.status})`);
        const p = await res.json();
        if (!p || !p.id) throw new Error('Invalid product data');

        const imgSrc = WC.img(p.image);

        if (img && imgSrc) { img.src = imgSrc; img.alt = p.name || ''; }
        if (title) title.textContent = p.name || '';
        if (price) price.textContent = `₹${p.price ?? 0}`;
        if (desc) desc.textContent = p.description || '';

        if (status) {
          const stock = Number(p.stock) || 0;
          if (stock > 0) {
            status.textContent = `In Stock (${stock} available)`;
            status.style.color = '#27ae60';
          } else {
            status.textContent = 'Out of Stock';
            status.style.color = '#e74c3c';
          }
        }

        document.title = `${p.name || 'Product'} – WoolCraft Studio`;

        // Canonical URL for product
        let canonical = document.querySelector('link[rel="canonical"]');
        if (!canonical) {
          canonical = document.createElement('link');
          canonical.rel = 'canonical';
          document.head.appendChild(canonical);
        }
        canonical.href = `https://woolcraftstudio.com/product.html?id=${p.id}`;

        if (!Array.isArray(window.products)) window.products = [];
        if (!window.products.find(x => x.id === p.id)) window.products.push(p);

        if (btn) btn.setAttribute('onclick', `addToCart(${p.id})`);

        if (waLink) {
          const msg = `Hi! I'm interested in "${p.name}" (₹${p.price}). Is it available?`;
          waLink.href = WC.waLink(msg);
        }
      } catch (e) {
        console.error('[product] load error:', e);
        if (title) title.textContent = 'Product not found';
        if (desc) desc.textContent = 'Could not load product details. Please try again.';
        if (btn) btn.style.display = 'none';
      }
    }

    loadProductFromQuery();
  </script>
